## IDF Component Manager Manifest File
dependencies:
  ## Required IDF version
  idf:
    version: '>=5.0'
  ## ESP-SR for speech recognition
  espressif/esp-sr: "^2.0.0"
  ## Audio codec device framework
  espressif/esp_codec_dev: "^1.0.0"
  ## ESP-Hosted for WiFi via ESP32-C6 co-processor
  espressif/esp_hosted:
    version: "*"
    rules:
      - if: "target in [esp32p4]"
  ## WiFi remote (required for ESP32-P4 WiFi abstraction)
  espressif/esp_wifi_remote:
    version: ">=1.3.1"
    rules:
      - if: "target in [esp32p4]"
      - if: "idf_version <6.1"
